name: Kick Downloader

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: "Direct m3u8 URL"
        required: true
        default: "https://d26yk4zpyhjeeq.cloudfront.net/v1/manifest/..."

      start_time:
        description: "Start time (HH:MM:SS)"
        required: false

      end_time:
        description: "End time (HH:MM:SS)"
        required: false

      output_name:
        description: "Output file name"
        required: false
        default: "kick_clip"

jobs:
  download:
    runs-on: ubuntu-latest

    env:
      OUTPUT_NAME: ${{ github.event.inputs.output_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p downloads
          mkdir -p outputs

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            p7zip-full \
            jq

      - name: Download full stream
        if: ${{ github.event.inputs.start_time == '' && github.event.inputs.end_time == '' }}
        run: |
          ffmpeg \
            -y \
            -i "${{ github.event.inputs.stream_url }}" \
            -c copy \
            "downloads/${OUTPUT_NAME}.mp4"

      - name: Download partial stream
        if: ${{ github.event.inputs.start_time != '' || github.event.inputs.end_time != '' }}
        run: |
          ffmpeg \
            -y \
            -ss "${{ github.event.inputs.start_time }}" \
            -to "${{ github.event.inputs.end_time }}" \
            -i "${{ github.event.inputs.stream_url }}" \
            -c copy \
            "downloads/${OUTPUT_NAME}.mp4"

      - name: Verify output file
        run: |
          ls -lh downloads/

          FILE_SIZE=$(stat -c%s "downloads/${OUTPUT_NAME}.mp4")

          echo "File size: $FILE_SIZE"

          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Downloaded file is too small"
            exit 1
          fi

      - name: Create multi-part archive
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          7z a \
            -v40m \
            -mx=0 \
            "outputs/${OUTPUT_NAME}_${TIMESTAMP}.7z" \
            downloads/*

      - name: Upload to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

        shell: bash
        run: |
          shopt -s nullglob

          for file in outputs/*; do

            echo ""
            echo "================================="
            echo "Uploading: $file"
            echo "================================="

            SUCCESS=0

            while [ $SUCCESS -eq 0 ]; do

              RESPONSE=$(curl \
                -F document=@"$file" \
                "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}")

              echo "$RESPONSE"

              OK=$(echo "$RESPONSE" | jq -r '.ok')

              if [ "$OK" = "true" ]; then

                echo ""
                echo "Upload successful."

                SUCCESS=1

              else

                ERROR_DESC=$(echo "$RESPONSE" | jq -r '.description')

                RETRY_AFTER=$(echo "$RESPONSE" | jq -r '.parameters.retry_after // 10')

                echo ""
                echo "Upload failed:"
                echo "$ERROR_DESC"

                echo ""
                echo "Retrying after ${RETRY_AFTER}s..."

                sleep "$RETRY_AFTER"

              fi

            done

          done

      - name: Cleanup
        if: always()
        run: |
          rm -rf downloads
          rm -rf outputs

          rm -rf temp